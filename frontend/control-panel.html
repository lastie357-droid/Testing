<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Control - Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            color: #00ff00;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 250px; height: 100vh;
            background: #0a0a0a; border-right: 2px solid #ff0000;
            padding: 20px; overflow-y: auto; z-index: 1000;
        }
        .sidebar-header {
            text-align: center; padding: 20px 0;
            border-bottom: 2px solid #ff0000; margin-bottom: 20px;
        }
        .sidebar-header h2 {
            color: #ff0000; font-size: 1.5em;
            text-shadow: 0 0 10px #ff0000;
        }
        .menu-item {
            padding: 15px; margin: 10px 0;
            background: rgba(255, 0, 0, 0.1);
            border-left: 3px solid #ff0000;
            cursor: pointer; transition: all 0.3s ease;
            border-radius: 5px;
        }
        .menu-item:hover {
            background: rgba(255, 0, 0, 0.3);
            padding-left: 25px;
        }
        .main-content { margin-left: 250px; padding: 30px; }
        .header {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            padding: 30px; border-radius: 15px; margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.5);
        }
        .header h1 { color: #ffffff; font-size: 2.5em; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a; padding: 25px;
            border-radius: 15px; border: 2px solid #ff0000;
            text-align: center; transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.5);
        }
        .stat-value { font-size: 2.5em; color: #00ff00; font-weight: bold; }
        .stat-label { font-size: 1.1em; color: #ffffff; margin-top: 10px; }
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .device-card {
            background: #1a1a1a; padding: 20px;
            border-radius: 15px; border: 2px solid #ff0000;
            transition: all 0.3s ease;
        }
        .device-card.online { border-color: #00ff00; }
        .action-btn {
            padding: 10px; background: #ff0000; color: #ffffff;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: all 0.3s ease;
        }
        .action-btn:hover {
            background: #00ff00; color: #000000;
            transform: scale(1.05);
        }
        .terminal {
            background: #000000; padding: 20px;
            border-radius: 15px; border: 2px solid #00ff00;
            min-height: 300px; max-height: 500px;
            overflow-y: auto; font-family: 'Courier New', monospace;
        }
        .terminal-line { color: #00ff00; margin: 5px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Client Control</h2>
            <div style="color: #00ff00; font-size: 0.9em;">v3.0.0</div>
        </div>
        <div class="menu-item">📱 Devices</div>
        <div class="menu-item">💻 Terminal</div>
        <div class="menu-item">⌨️ Keylogger</div>
        <div class="menu-item">📁 Files</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Client Control Panel</h1>
            <div style="color: #ffff00; font-size: 1.2em; margin-top: 10px;">
                Remote Device Management
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Total Devices</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Online Now</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Commands Sent</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Logs Collected</div>
            </div>
        </div>

        <h2 style="color: #ff0000; margin-bottom: 20px;">📱 Connected Devices</h2>
        <div class="device-grid">
            <div class="device-card online">
                <h3 style="color: #ff0000;">Sample Device</h3>
                <div style="margin: 15px 0;">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span style="color: #888;">Model:</span>
                        <span style="color: #00ff00;">Samsung Galaxy</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span style="color: #888;">Android:</span>
                        <span style="color: #00ff00;">13</span>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <button class="action-btn">📷 Screenshot</button>
                    <button class="action-btn">🎥 Record</button>
                    <button class="action-btn">📍 Location</button>
                </div>
            </div>
        </div>

        <h2 style="color: #ff0000; margin: 30px 0 20px;">💻 Terminal</h2>
        <div class="terminal">
            <div class="terminal-line">Client Control Terminal v3.0.0</div>
            <div class="terminal-line">Ready...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        console.log('Client Control Dashboard Loaded');
        console.log('Connect to: http://localhost:5000');
    </script>
</body>
</html>
